name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: claude-guardian-aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: claude-guardian-x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: claude-guardian-x86_64-unknown-linux-musl

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Build UI
        run: |
          cd ui
          npm ci
          npm run build

      - name: Build Rust binary
        run: |
          cargo build --release --target ${{ matrix.target }}
          mv target/${{ matrix.target }}/release/claude-guardian ${{ matrix.artifact }}

      - name: Generate checksum
        run: shasum -a 256 ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

  update-formula:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download checksums
        run: |
          VERSION=${GITHUB_REF_NAME}
          BASE="https://github.com/Nihal-Ahamed-MS/claude-guardian/releases/download/${VERSION}"
          ARM_SHA=$(curl -sL "${BASE}/claude-guardian-aarch64-apple-darwin.sha256" | awk '{print $1}')
          X86_SHA=$(curl -sL "${BASE}/claude-guardian-x86_64-apple-darwin.sha256" | awk '{print $1}')
          echo "ARM_SHA=${ARM_SHA}" >> $GITHUB_ENV
          echo "X86_SHA=${X86_SHA}" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Update Homebrew formula
        run: |
          sed -i \
            -e "s|version \".*\"|version \"${VERSION#v}\"|" \
            -e "s|sha256 \"ARM_PLACEHOLDER\"|sha256 \"${ARM_SHA}\"|" \
            -e "s|sha256 \"X86_PLACEHOLDER\"|sha256 \"${X86_SHA}\"|" \
            -e "s|/download/v[^/]*/|/download/${VERSION}/|g" \
            Formula/claude-guardian.rb

      - name: Commit updated formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/claude-guardian.rb
          git commit -m "chore: update formula to ${VERSION}"
          git pull --rebase origin main
          git push origin HEAD:main
